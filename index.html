<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YTM Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-sans overflow-hidden">
    <div id="setup-screen" class="flex flex-col items-center justify-center h-screen p-8 gap-6">
        <h1 class="text-4xl font-bold text-[#ff2d2d]">YTM Remote</h1>
        <div class="w-full bg-[#141414] p-6 rounded-2xl border border-[#2a2a2a] text-center">
            <div id="code-display" class="hidden mb-4">
                <p class="text-sm text-gray-400 mb-2">Click "Allow" on your computer</p>
                <div id="pair-code" class="text-4xl font-mono font-bold tracking-widest text-[#ff2d2d]">------</div>
            </div>
            <button id="connect-btn" class="w-full bg-[#ff2d2d] py-4 rounded-xl font-bold text-lg active:scale-95 transition-transform">CONNECT</button>
            <p id="status" class="mt-4 text-sm text-gray-500 italic">Ready to pair</p>
        </div>
    </div>

    <div id="remote-screen" class="hidden flex-col h-screen p-6 text-center">
        <div class="flex-1 flex flex-col items-center justify-center gap-6">
            <img id="cover" class="w-64 h-64 rounded-2xl shadow-2xl border border-gray-800" src="">
            <div>
                <h2 id="title" class="text-2xl font-bold truncate px-4">Not Playing</h2>
                <p id="artist" class="text-gray-400">—</p>
            </div>
        </div>
        <div class="flex justify-center items-center gap-10 pb-12">
            <button id="prev" class="text-3xl">⏮</button>
            <button id="play" class="w-20 h-20 bg-[#ff2d2d] rounded-full text-4xl flex items-center justify-center shadow-lg">⏯</button>
            <button id="next" class="text-3xl">⏭</button>
        </div>
    </div>

<script>
const BASE_URL = 'https://10masari-remote.loca.lt'; 
const APP_ID = 'ytm-remote-web';
let token = localStorage.getItem('ytm_token') || '';

async function api(method, path, body) {
    // We add /api/v1 here so the paths in the functions remain clean
    const url = BASE_URL.replace(/\/+$/, '') + '/api/v1' + (path.startsWith('/') ? path : '/' + path);
    
    const opts = { 
        method, 
        headers: { 
            'Content-Type': 'application/json',
            'Bypass-Tunnel-Reminder': 'true',
            'X-Requested-With': 'XMLHttpRequest'
        } 
    };
    
    if (token) opts.headers['Authorization'] = token;
    if (body) opts.body = JSON.stringify(body);

    try {
        const res = await fetch(url, opts);
        if (res.status === 401 && path !== '/auth/requestcode') {
            token = '';
            localStorage.removeItem('ytm_token');
            location.reload();
        }
        const t = await res.text();
        return t ? JSON.parse(t) : {};
    } catch (e) {
        console.error("API Error:", e);
        throw e;
    }
}

const $ = id => document.getElementById(id);

$('connect-btn').onclick = async () => {
    $('status').textContent = 'Requesting pair code...';
    try {
        const data = await api('POST', '/auth/requestcode', { 
            appId: APP_ID, 
            appName: 'Web Remote', 
            appVersion: '1.0.0' 
        });
        
        if (data.code) {
            $('pair-code').textContent = data.code;
            $('code-display').classList.remove('hidden');
            $('connect-btn').classList.add('hidden');
            $('status').textContent = 'Now click ALLOW on your computer';

            const auth = await api('POST', '/auth/request', { appId: APP_ID, code: data.code });
            if (auth.token) {
                token = auth.token;
                localStorage.setItem('ytm_token', token);
                location.reload();
            }
        }
    } catch (e) {
        $('status').textContent = 'Still failing? Try visiting the .lt link directly first.';
    }
};

async function poll() {
    try {
        const s = await api('GET', '/state');
        const v = s.video || {};
        $('title').textContent = v.title || 'No song';
        $('artist').textContent = v.author || '—';
        if (v.thumbnails?.length) $('cover').src = v.thumbnails[v.thumbnails.length-1].url;
        setTimeout(poll, 2000);
    } catch(e) { setTimeout(poll, 4000); }
}

if (token) {
    $('setup-screen').classList.add('hidden');
    $('remote-screen').classList.remove('hidden');
    $('remote-screen').classList.add('flex');
    poll();
}

const cmd = c => api('POST', '/command', { command: c });
$('play').onclick = () => cmd('playPause');
$('prev').onclick = () => cmd('previous');
$('next').onclick = () => cmd('next');
</script>
</body>
</html>
